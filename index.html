<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- 1. Primary HTML Redirect (0 seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://ayushacharya.info.np">
    
    <!-- SEO best practice: Tell search engines the page has permanently moved -->
    <link rel="canonical" href="https://ayushacharya.info.np">

    <!-- 2. JavaScript Fallback Redirect -->
    <script>
        window.location.href = "https://ayushacharya.info.np";
    </script>
</head>
<body>
    <!-- 3. Manual Fallback Link -->
    <p>If you are not redirected automatically, <a href="https://ayushacharya.info.np">click here to go to ayushacharya.info.np</a>.</p>
</body>
</html>
